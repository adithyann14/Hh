name: Build WiFi Tile APK

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Assemble debug & release (unsigned)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      # No gradle-wrapper.jar is committed (binary file), so we provision
      # Gradle directly via the official setup-gradle action instead of
      # ./gradlew — same reproducibility, no binary checked into the repo.
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.9"
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: Assemble debug APK
        run: gradle :app:assembleDebug --stacktrace

      - name: Assemble release APK (unsigned)
        run: gradle :app:assembleRelease --stacktrace

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: wifitile-debug
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error

      - name: Upload release APK (unsigned)
        uses: actions/upload-artifact@v4
        with:
          name: wifitile-release-unsigned
          path: app/build/outputs/apk/release/*.apk
          if-no-files-found: error

      # -----------------------------------------------------------------------
      # SIGNED release build — intentionally left OFF for now. To enable it:
      #
      #   1. Generate a keystore (if you don't have one):
      #        keytool -genkey -v -keystore release.keystore -alias bypasstile \
      #          -keyalg RSA -keysize 2048 -validity 10000
