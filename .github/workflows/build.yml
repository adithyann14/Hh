      #   2. Add four repo secrets under Settings → Secrets and variables → Actions:
      #        KEYSTORE_BASE64    (base64 -w0 release.keystore)
      #        KEYSTORE_PASSWORD
      #        KEY_ALIAS
      #        KEY_PASSWORD
      #
      #   3. Add a signingConfigs block to app/build.gradle.kts, e.g.:
      #        signingConfigs {
      #            create("release") {
      #                storeFile = file("release.keystore")
      #                storePassword = System.getenv("KEYSTORE_PASSWORD")
      #                keyAlias = System.getenv("KEY_ALIAS")
      #                keyPassword = System.getenv("KEY_PASSWORD")
      #            }
      #        }
      #      ...and reference it from buildTypes.release.signingConfig.
      #
      #   4. Uncomment the three steps below.
